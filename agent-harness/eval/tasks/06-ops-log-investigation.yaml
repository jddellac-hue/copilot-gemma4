id: 06-ops-log-investigation
category: ops
description: |
  Simulates an ops investigation: the agent must search through log files
  to identify the most frequent error type and report it. No mutations.

fixture:
  files:
    "logs/app-2026-04-01.log": |
      2026-04-01T10:00:01Z INFO  request received
      2026-04-01T10:00:02Z ERROR connection refused: db.internal:5432
      2026-04-01T10:00:05Z INFO  request received
      2026-04-01T10:00:06Z ERROR connection refused: db.internal:5432
      2026-04-01T10:00:09Z WARN  slow query 1.2s
      2026-04-01T10:00:11Z ERROR connection refused: db.internal:5432
      2026-04-01T10:00:14Z ERROR timeout waiting for upstream
      2026-04-01T10:00:18Z ERROR connection refused: db.internal:5432
    "logs/app-2026-04-02.log": |
      2026-04-02T08:00:00Z INFO  startup
      2026-04-02T08:00:03Z ERROR connection refused: db.internal:5432
      2026-04-02T08:00:09Z ERROR timeout waiting for upstream

prompt: |
  Look at the logs in `logs/`. What is the most frequent error message?
  Answer with the error text only, no preamble.

success:
  type: contains
  expected: "connection refused"
  case_sensitive: false

budget:
  max_steps: 10
  max_tokens: 10000
