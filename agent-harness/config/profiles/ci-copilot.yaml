# =============================================================================
# Profile: ci-copilot
# =============================================================================
# Non-interactive profile for running evals with GitHub Copilot (Models API).
# No `ask` decisions — every tool call is allowed or denied.
# =============================================================================

name: ci-copilot
profile_type: coding
log_level: WARNING

model:
  provider: openai
  endpoint: https://models.inference.ai.azure.com
  name: gpt-4o
  api_key_env: GITHUB_TOKEN
  temperature: 0.0
  max_tokens: 4096

agent:
  max_steps: 30
  token_budget: 200000
  wall_clock_timeout_s: 300
  repetition_threshold: 2

memory:
  soft_budget_tokens: 16000

sandbox:
  backend: bubblewrap
  allow_network: false
  max_output_bytes: 32768

permissions:
  default: deny
  audit_log_path: /tmp/agent-harness-ci-copilot-audit.jsonl

  rules:
    - tool: read_file
      decision: allow
    - tool: list_dir
      decision: allow
    - tool: search_files
      decision: allow
    - tool: write_file
      decision: allow
      patterns_deny:
        - "\\.\\."
        - "/etc/"
        - "/usr/"
    - tool: edit_file
      decision: allow
    - tool: bash
      decision: allow
      patterns_deny:
        - "\\brm\\s+-rf?\\s+/"
        - "\\bsudo\\b"
        - "\\bcurl\\b"
        - "\\bwget\\b"
        - "\\bgit\\s+push\\b"
        - "\\|\\s*(sh|bash)\\b"
    - tool: "*"
      decision: deny

eval:
  budget_multiplier: 1.0

observability:
  enabled: false
  service_name: agent-harness-ci-copilot
  otlp_endpoint: null
