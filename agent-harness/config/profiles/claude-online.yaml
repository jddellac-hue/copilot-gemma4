# =============================================================================
# Profile: claude-online
# =============================================================================
# Agent coding utilisant Claude (API Anthropic) comme cerveau.
# Memes outils, permissions et sandbox que les profils Gemma locaux, mais
# le raisonnement est fait par Claude en ligne.
#
# Prerequis : ANTHROPIC_API_KEY dans l'environnement.
# =============================================================================

name: claude-online
profile_type: coding
log_level: INFO

model:
  provider: anthropic
  name: claude-sonnet-4-20250514
  temperature: 0.2
  max_tokens: 4096

agent:
  max_steps: 30
  token_budget: 200000
  wall_clock_timeout_s: 300       # API rapide, pas besoin de 10 min
  repetition_threshold: 3

memory:
  soft_budget_tokens: 16000
  long_term_path: ~/.local/share/agent-harness/notes-claude.md

sandbox:
  backend: bubblewrap
  allow_network: false
  max_output_bytes: 32768
  extra_ro_binds: []

ops_tools:
  skills:
    enabled: true
    path: skills
    collection_name: agent_skills
    persist_dir: ~/.local/share/agent-harness/chroma
    max_results: 5

permissions:
  default: ask
  audit_log_path: ~/.local/share/agent-harness/audit-claude.jsonl

  rules:
    # ---- Read-only: always safe ----
    - tool: read_file
      decision: allow
      patterns_deny:
        - "skills/"
    - tool: list_dir
      decision: allow
      patterns_deny:
        - "skills/"
    - tool: search_files
      decision: allow
      patterns_deny:
        - "skills/"

    # ---- Write: ask, deny sensitive paths ----
    - tool: write_file
      decision: ask
      patterns_deny:
        - "\\.ssh/"
        - "\\.aws/"
        - "\\.kube/"
        - "\\.gnupg/"
        - "/etc/"
        - "/usr/"
        - "id_rsa"
        - "id_ed25519"

    - tool: edit_file
      decision: ask
      patterns_deny:
        - "\\.ssh/"
        - "\\.aws/"
        - "\\.kube/"
        - "/etc/"

    # ---- Bash: ask, deny dangerous patterns ----
    - tool: bash
      decision: ask
      patterns_deny:
        - "\\brm\\s+-rf?\\s+/"
        - "\\brm\\s+-rf?\\s+\\*"
        - "\\bmkfs\\b"
        - "\\bsudo\\b"
        - "\\bsu\\b"
        - "\\|\\s*(sh|bash)\\b"
        - "git\\s+push\\s+.*--force"
        - "git\\s+reset\\s+--hard"
        - "chmod\\s+-R\\s+777"
      patterns_ask:
        - "git\\s+push"
        - "pip\\s+install"

    # ---- Skills: read-only RAG search ----
    - tool: search_skills
      decision: allow

    # ---- Catch-all ----
    - tool: "*"
      decision: ask

observability:
  enabled: false
  service_name: agent-harness-claude
  otlp_endpoint: null
